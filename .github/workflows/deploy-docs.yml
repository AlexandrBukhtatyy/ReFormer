name: Deploy Documentation

on:
  push:
    branches:
      - develop
    paths:
      - 'projects/reformer-doc/**'
      - 'packages/reformer/src/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm ci использует package-lock.json для повторяемой сборки.
        # Раньше тут было `rm package-lock.json && npm install` — это давало
        # каждый раз свежий resolve с npm, что приводило к несовместимости
        # transitive deps (например webpackbar с новым webpack ProgressPlugin
        # после bump Node 22).
        run: npm ci

      - name: Build documentation
        run: npm run build -w reformer-doc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/reformer-doc/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
