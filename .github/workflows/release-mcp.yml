name: Release @reformer/mcp

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/reformer-mcp/**'
      - '.github/workflows/release-mcp.yml'

concurrency:
  # Все release-* workflow share одну очередь, чтобы предотвратить race
  # на git push refs/notes/semantic-release. Параллельные releases ломали
  # друг друга с "! [rejected] (fetch first)". cancel-in-progress: false
  # — новый run ждёт текущий, не отменяет.
  group: semantic-release-notes
  cancel-in-progress: false

jobs:
  release:
    name: Release @reformer/mcp
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: npm run build -w @reformer/mcp

      - name: Fetch git notes
        run: git fetch origin refs/notes/semantic-release:refs/notes/semantic-release || true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
        working-directory: packages/reformer-mcp
