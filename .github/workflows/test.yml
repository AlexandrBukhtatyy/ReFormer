name: Test

# Переиспользуемый workflow с проверками качества (lint + format + build + tests).
# Вызывается из ci.yml (push/PR) и из release.yml (как gate перед публикацией) —
# единый источник правды, чтобы шаги не разъезжались между двумя workflow.
# Сам по себе не запускается (только workflow_call).

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build @reformer/core
        run: npm run build -w @reformer/core

      - name: Run @reformer/core tests
        run: npm run test -w @reformer/core

      - name: Build @reformer/cdk
        run: npm run build -w @reformer/cdk

      - name: Run @reformer/cdk tests
        run: npm run test -w @reformer/cdk

      - name: Build @reformer/renderer-react
        run: npm run build -w @reformer/renderer-react

      - name: Run @reformer/renderer-react tests
        run: npm run test -w @reformer/renderer-react

      - name: Build @reformer/ui-kit
        run: npm run build -w @reformer/ui-kit

      - name: Run @reformer/ui-kit tests
        run: npm run test -w @reformer/ui-kit

      - name: Subpath smoke @reformer/ui-kit
        # npm pack + установка тарбола в чистый проект в os.tmpdir() и динамический
        # импорт всех subpath из exports. Вне репозитория намеренно: внутри него
        # недостающая зависимость ложно находится в корневом node_modules и проверка
        # зеленеет. Соседи ставятся по списку из peerDependencies, поэтому
        # незадекларированный импорт в песочнице не резолвится. Заодно проверяет поле
        # "files" (subpath объявлен, а файла в тарболе нет). Требует собранных
        # core / cdk / renderer-react — они пакуются локальными тарболами, чтобы
        # проверять текущий код, а не последний релиз в npm.
        run: npm run check:subpaths -w @reformer/ui-kit

      - name: Build @reformer/renderer-json
        run: npm run build -w @reformer/renderer-json

      - name: Run @reformer/renderer-json tests
        run: npm run test -w @reformer/renderer-json

      # mcp — публикуемый пакет, но тестов у него нет. Собираем ради шага
      # «Dist deps ↔ manifest» ниже: check:dist-deps сканирует ВСЕ packages/*,
      # и без dist/ у mcp падал бы «нет dist/ — сначала соберите пакет».
      - name: Build @reformer/mcp
        run: npm run build -w @reformer/mcp

      - name: Dist deps ↔ manifest
        # Каждый внешний импорт dist/ должен быть объявлен в dependencies или
        # peerDependencies пакета. Ловит зависимость, оставленную в devDependencies:
        # локально и в CI всё зелёное (devDeps установлены), а у потребителя subpath
        # падает с ERR_MODULE_NOT_FOUND — так разъехались 11 heavy-deps @reformer/ui-kit
        # (recharts / cmdk / @tanstack/react-table / …). Идёт после всех build-шагов:
        # проверяются dist/ всех packages/*.
        run: npm run check:dist-deps

      - name: Bundle size (size-limit)
        # Enforces brotli caps in .size-limit.json against the freshly built dist/
        # of every @reformer/* package (all builds above ran, so the artifacts
        # exist). Guards the heavy @reformer/ui-kit subpaths (chart/table/sidebar/
        # calendar/carousel/command/drawer/date-picker/resizable/sonner/input-otp)
        # and the shared utils chunk — if the vite `external` predicate ever stops
        # excluding a heavy dep, its subpath balloons and this step goes red.
        # @size-limit/file measures brotli and does NOT follow imports.
        run: npm run size

      - name: Check generated form-schema is up to date
        run: |
          npm run gen:form-schema -w react-playground
          git diff --exit-code -- 'projects/react-playground/src/pages/examples/complex-multy-step-form-renderer-json/form-schema.schema.json'

      - name: Check generated llms.txt is up to date
        # llms.txt собирается из docs/llms/*.md + JSDoc и публикуется в npm (поле files).
        # Build каждого пакета уже прогнал generate:llms, поэтому расхождение здесь
        # значит, что закоммиченный файл отстал от исходников: правки в docs/llms или
        # в JSDoc до потребителя не доедут. Так llms.txt @reformer/ui-kit целый релизный
        # цикл отдавал устаревший список peer-зависимостей.
        run: git diff --exit-code -- 'packages/*/llms.txt'

      - name: Typecheck
        # Runs AFTER package builds so @reformer/* dist type declarations exist —
        # packages resolve each other through built dist, not src. Package "build"
        # is vite/esbuild (transpile only, no type check), so type errors slip past
        # CI and only surface later in typedoc (Deploy Documentation). This gate
        # catches them before merge to main. @reformer/cdk is excluded pending a
        # fix of its generic React-Context variance errors (tracked separately).
        run: npm run typecheck
