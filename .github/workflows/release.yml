name: Release

# Единый release-workflow для всех пакетов monorepo. Запускает semantic-release
# для каждого пакета СТРОГО ПОСЛЕДОВАТЕЛЬНО (max-parallel: 1) — это решает
# race на `git push refs/notes/semantic-release` (общий ref для всех пакетов
# в semantic-release; параллельный push с разных runner-ов проигрывал ref-lock).
#
# Заменяет release-{core,cdk,ui-kit,renderer-react,renderer-json,mcp}.yml.
# Каждая итерация matrix эквивалентна старому per-package workflow.
#
# Если в пакете нет новых коммитов с прошлого тега — semantic-release сам
# напишет "no release needed" и выйдет с code 0; latency ~30s на "холостой"
# пакет, total worst case ~6 × 30s = 3 минуты.

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/**'
      - '.github/workflows/release.yml'
  workflow_dispatch: # для ручного re-run без коммита (например после исправления git tags)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      # Sequential — гарантированно один semantic-release за раз; нет race
      # на `refs/notes/semantic-release`.
      max-parallel: 1
      # Один upstream-сбой не блокирует остальные пакеты.
      fail-fast: false
      matrix:
        include:
          - workspace: '@reformer/core'
            dir: packages/reformer
            deps: ''
            run_tests: true
          - workspace: '@reformer/cdk'
            dir: packages/reformer-cdk
            deps: '@reformer/core'
            run_tests: false
          - workspace: '@reformer/renderer-react'
            dir: packages/reformer-renderer-react
            deps: '@reformer/core'
            run_tests: false
          - workspace: '@reformer/ui-kit'
            dir: packages/reformer-ui-kit
            deps: '@reformer/core @reformer/cdk'
            run_tests: false
          - workspace: '@reformer/renderer-json'
            dir: packages/reformer-renderer-json
            deps: '@reformer/core @reformer/renderer-react'
            run_tests: false
          - workspace: '@reformer/mcp'
            dir: packages/reformer-mcp
            deps: ''
            run_tests: false

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build dependencies
        if: matrix.deps != ''
        run: |
          for dep in ${{ matrix.deps }}; do
            echo "::group::Build $dep"
            npm run build -w "$dep"
            echo "::endgroup::"
          done

      - name: Build ${{ matrix.workspace }}
        run: npm run build -w '${{ matrix.workspace }}'

      - name: Run tests
        if: matrix.run_tests
        run: npm run test -w '${{ matrix.workspace }}'

      - name: Fetch git notes
        # Каждая итерация matrix начинается с свежего fetch — между итерациями
        # предыдущая semantic-release могла обновить notes на remote.
        run: git fetch origin refs/notes/semantic-release:refs/notes/semantic-release || true

      - name: Release ${{ matrix.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
        working-directory: ${{ matrix.dir }}
