name: Release

# Единый release-workflow для всех пакетов monorepo. Один последовательный джоб:
# один checkout + один `npm ci` + одна сборка всех пакетов в топо-порядке, затем
# semantic-release по каждому пакету последовательно в цикле.
#
# Почему не matrix: раньше был matrix с `max-parallel: 1` (сериализация ради
# race на общий ref `refs/notes/semantic-release`). Но max-parallel:1 не даёт
# параллелизма — только оверхед: 6× checkout, 6× npm ci, 18 пересборок. Единый
# джоб убирает это (1× npm ci, 6 build-ов) и попутно снимает саму гонку notes
# (один процесс, локальный ref обновляется сам — max-parallel не нужен).
#
# Изоляция сбоев (замена fail-fast: false): release-цикл ловит падение каждого
# пакета через `if ( … )`, копит упавшие и падает в конце — один сбой не
# блокирует публикацию остальных. Падение СБОРКИ линейно прерывает джоб до
# релиза (нельзя публиковать из несобранного; needs: test уже собрал те же
# пакеты). Если в пакете нет новых коммитов — semantic-release пишет
# "no release needed" и выходит с code 0.

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/**'
      - '.github/workflows/release.yml'
  workflow_dispatch: # для ручного re-run без коммита (например после исправления git tags)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: ничего не публикуется, пока CI не зелёный (lint + format + build + tests).
  # Тот же переиспользуемый workflow, что и в ci.yml — единый источник правды.
  test:
    uses: ./.github/workflows/test.yml

  release:
    name: Release all packages
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages in dependency order
        # Один раз собираем ВСЕ пакеты в топологическом порядке (тот же, что в
        # test.yml и align-versions.yml). Корневой `npm run build --workspaces`
        # НЕ годится: npm не топо-сортирует workspaces (mcp/tsc собрался бы до
        # своих dist-зависимостей → TS2307) и захватил бы projects/*.
        run: |
          for pkg in @reformer/core @reformer/cdk @reformer/renderer-react \
                     @reformer/ui-kit @reformer/renderer-json @reformer/mcp; do
            echo "::group::Build $pkg"
            npm run build -w "$pkg"
            echo "::endgroup::"
          done

      # Тесты не повторяем: needs: test (reusable test.yml) уже собрал и прогнал
      # тесты всех пакетов + dist-deps/size/typecheck.

      - name: Fetch git notes
        # checkout не тянет refs/notes/*, а semantic-release хранит там каналы
        # релиза. Тянем ОДИН раз перед циклом — внутри одного джоба каждый
        # semantic-release сам обновляет локальный ref, между пакетами fetch не
        # нужен, а гонки параллельных runner-ов больше нет.
        run: git fetch origin refs/notes/semantic-release:refs/notes/semantic-release || true

      - name: Release all packages (sequential, fault-isolated)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # workspace:dir в топологическом порядке.
          packages=(
            "@reformer/core:packages/reformer"
            "@reformer/cdk:packages/reformer-cdk"
            "@reformer/renderer-react:packages/reformer-renderer-react"
            "@reformer/ui-kit:packages/reformer-ui-kit"
            "@reformer/renderer-json:packages/reformer-renderer-json"
            "@reformer/mcp:packages/reformer-mcp"
          )
          failed=()
          for entry in "${packages[@]}"; do
            ws="${entry%%:*}"
            dir="${entry#*:}"
            echo "::group::Release $ws"
            # Команда в условии `if` не срабатывает под set -e, поэтому один
            # упавший пакет не рвёт цикл. "no release needed" → exit 0 (не сбой);
            # реальный сбой публикации → exit != 0 → копим и падаем в конце.
            if ( cd "$dir" && npx semantic-release ); then
              echo "$ws: done"
            else
              echo "::error::semantic-release failed for $ws"
              failed+=("$ws")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            echo "::error::Release failed for: ${failed[*]}"
            exit 1
          fi
